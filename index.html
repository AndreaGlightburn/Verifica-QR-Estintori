<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Verifica Estintori</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --line:#2d333b;
    --ink:#e6edf3; --dim:#7d8590;
    --ok:#2ea043; --ko:#da3633; --accent:#d29922;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    display:flex;flex-direction:column;min-height:100dvh;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  header{
    padding:16px 18px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  header h1{font-size:15px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
  header h1 span{color:var(--accent)}
  .badge{font-size:12px;color:var(--dim);white-space:nowrap}
  main{flex:1;display:flex;flex-direction:column;padding:18px;gap:16px}

  button.scan{
    width:100%;padding:16px;border:none;border-radius:12px;
    background:var(--accent);color:#1a1300;font-weight:700;font-size:16px;
    letter-spacing:.5px;cursor:pointer;font-family:inherit;
  }

  #reader{border-radius:12px;overflow:hidden;display:none}
  #reader.on{display:block}

  .result{
    flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;
    border-radius:16px;padding:28px 20px;text-align:center;gap:8px;
    border:2px solid var(--line);background:var(--panel);
  }
  .result.on{display:flex}
  .result.match{border-color:var(--ok);background:#0e2a14}
  .result.nomatch{border-color:var(--ko);background:#2a0e0e}
  .result .status{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
  .result.match .status{color:#56d364}
  .result.nomatch .status{color:#ff7b72}
  .result .big{
    font-size:clamp(72px,32vw,200px);font-weight:700;line-height:1;
    word-break:break-all;letter-spacing:1px;
  }
  .result .sub{font-size:13px;color:var(--dim);word-break:break-all;max-width:100%;margin-top:6px}
  .result .sub b{color:var(--ink)}

  footer{padding:10px 18px;text-align:center;font-size:11px;color:var(--dim);border-top:1px solid var(--line)}
  .hint{font-size:12px;color:var(--dim);text-align:center;line-height:1.5}
</style>
</head>
<body>
<header>
  <h1>Verifica <span>Estintori</span></h1>
  <span class="badge" id="count">…</span>
</header>

<main>
  <button class="scan" id="scanBtn">Avvia scansione</button>
  <div id="reader"></div>
  <div class="result" id="result">
    <div class="status" id="status"></div>
    <div class="big" id="big"></div>
    <div class="sub" id="sub"></div>
  </div>
  <p class="hint" id="hint">Premi “Avvia scansione” e inquadra il QR.</p>
</main>

<footer>Tabella incorporata · nessun dato inviato online</footer>

<script>
// ===== TABELLA INCORPORATA (QR -> codice) =====

};
// ==============================================

const map = new Map(Object.entries(DATA));
let scanner = null, scanning = false;
const $ = id => document.getElementById(id);
$('count').textContent = map.size + ' estintori';

$('scanBtn').addEventListener('click', () => scanning ? stop() : start());

function start(){
  $('reader').classList.add('on');
  $('result').className = 'result';
  scanner = new Html5Qrcode('reader');
  scanner.start(
    {facingMode:'environment'},
    {fps:10, qrbox:{width:240, height:240}},
    onScan, ()=>{}
  ).then(()=>{
    scanning = true;
    $('scanBtn').textContent = 'Ferma scansione';
    $('hint').textContent = 'Inquadra il QR code.';
  }).catch(err=>{
    $('hint').textContent = 'Fotocamera non accessibile: ' + err + ' — apri la pagina in HTTPS e consenti la fotocamera.';
    $('reader').classList.remove('on');
  });
}

function stop(){
  if(scanner){ scanner.stop().then(()=>scanner.clear()).catch(()=>{}); }
  scanning = false;
  $('reader').classList.remove('on');
  $('scanBtn').textContent = 'Avvia scansione';
}

let last = '', lastT = 0;
function onScan(text){
  const now = Date.now();
  if(text === last && now - lastT < 2500) return;
  last = text; lastT = now;

  const qr = text.trim();
  const res = $('result');
  res.classList.add('on');

  if(map.has(qr)){
    const code = map.get(qr);
    res.className = 'result on match';
    $('status').textContent = 'Corrispondenza trovata';
    $('big').textContent = code || '—';
    $('sub').innerHTML = 'QR: <b>' + esc(qr) + '</b>';
  }else{
    res.className = 'result on nomatch';
    $('status').textContent = 'Non in tabella';
    $('big').textContent = '\u2715';
    $('sub').innerHTML = 'QR letto: <b>' + esc(qr) + '</b>';
  }
  if(navigator.vibrate) navigator.vibrate(80);
}

function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
</script>
</body>
</html>
